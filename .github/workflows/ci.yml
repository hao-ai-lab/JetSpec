name: CI

# CPU-only CI. GitHub-hosted runners have no GPU/CUDA, so this gate runs only
# the CPU-safe test subset: the engine-agnostic tree-construction unit tests and
# the JetFlow tests that build a tiny fp32 Qwen3 locally (no network, no GPU,
# no triton). GPU-gated tests (JETFLOW_TEST_MODEL / CUDA model load) run separately.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # No `.[kernel]` (triton): the CPU test subset imports and passes without
      # triton installed (paged_tree_attn imports triton lazily), so installing
      # it would only slow CI without exercising anything on a CPU runner.
      - name: Install package (+ test extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run CPU-safe tests
        run: |
          pytest -q \
            tests/test_build_from_topk.py \
            tests/test_depth_rank_histogram.py \
            tests/test_jetflow_attn_metadata.py \
            tests/test_jetflow_batch.py \
            tests/test_jetflow_paged_multiseq.py \
            tests/test_jetflow_tree.py \
            tests/test_jetflow_tree_batch.py
